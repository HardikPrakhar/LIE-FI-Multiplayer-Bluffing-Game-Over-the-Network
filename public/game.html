<!DOCTYPE html>
<html lang="en">
<head>
<title>LIE-FI</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ── Team setup ─────────────────────────────────── */
  #teamSetup { display:none; }

  .team-builder {
    background: #111;
    border: 1px solid #333;
    padding: 16px;
    margin: 12px auto;
    max-width: 460px;
    text-align: left;
  }
  .team-builder h4 { margin: 0 0 10px; color: #fff; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }

  .team-slot {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .team-slot label { color: #888; font-size: 12px; width: 60px; }
  .team-slot select {
    flex: 1;
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 6px;
    font-size: 13px;
  }
  .team-name-input {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 6px 10px;
    font-size: 13px;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 10px;
  }

  /* ── Team chat ───────────────────────────────────── */
  #chatPanel {
    display: none;
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 280px;
    background: #111;
    border: 1px solid #333;
    border-radius: 4px;
    z-index: 100;
    font-size: 13px;
  }
  #chatHeader {
    background: #222;
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #chatHeader span.badge {
    background: red;
    border-radius: 50%;
    width: 16px;
    height: 16px;
    font-size: 10px;
    display: none;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  #chatBody { display: block; }
  #chatMessages {
    height: 160px;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .chat-msg { padding: 4px 6px; border-radius: 3px; }
  .chat-msg.mine { background: #1a1a2e; text-align: right; }
  .chat-msg.theirs { background: #1e1e1e; }
  .chat-msg .sender { font-size: 10px; color: #888; margin-bottom: 2px; }
  .chat-msg .text { color: #eee; }
  #chatInputRow {
    display: flex;
    border-top: 1px solid #333;
  }
  #chatInput {
    flex: 1;
    background: #000;
    color: #fff;
    border: none;
    padding: 8px;
    font-size: 13px;
    outline: none;
  }
  #chatSend {
    background: #fff;
    color: #000;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
  }

  /* ── Mode toggle ─────────────────────────────────── */
  .mode-toggle {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 10px 0;
  }
  .mode-btn {
    flex: 1;
    padding: 10px;
    background: #222;
    color: #888;
    border: 1px solid #333;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .mode-btn.active {
    background: #fff;
    color: #000;
    border-color: #fff;
  }

  /* ── Notification toast ──────────────────────────── */
  #toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #fff;
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
    border: 1px solid #444;
  }
  #toast.show { opacity: 1; }

  /* ── Team badge on leaderboard ───────────────────── */
  .team-tag {
    font-size: 10px;
    color: #888;
    margin-left: 6px;
    background: #222;
    padding: 1px 5px;
    border-radius: 2px;
  }
  .player-row { display: flex; align-items: center; gap: 4px; margin: 3px 0; }
  .player-row .disc { width: 7px; height: 7px; border-radius: 50%; background: #555; display: inline-block; }
  .player-row .disc.online { background: #4caf50; }

  /* ── Answer buttons ──────────────────────────────── */
  #game button.answer-btn {
    display: block;
    width: 100%;
    max-width: 400px;
    margin: 6px auto;
    text-align: left;
    padding: 12px 16px;
    background: #111;
    color: #fff;
    border: 1px solid #333;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.15s, border-color 0.15s;
  }
  #game button.answer-btn:hover:not(:disabled) {
    background: #222;
    border-color: #fff;
  }
  #game button.answer-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Timer bar ───────────────────────────────────── */
  #timerBar {
    height: 3px;
    background: #fff;
    transition: width 1s linear;
    margin: 8px 0;
  }
</style>
</head>
<body>

<div class="container">

  <!-- JOIN SECTION -->
  <div id="joinSection">
    <h2>Join Game</h2>
    <input id="name" placeholder="Your name" autocomplete="off"/>
    <input id="room" placeholder="Room code" autocomplete="off"/>
    <button id="joinBtn">Join</button>
  </div>

  <!-- LOBBY SECTION -->
  <div id="lobbySection" style="display:none;">
    <h3>Lobby <span id="roomLabel" style="color:#888;font-size:13px;"></span></h3>
    <ul id="players" style="list-style:none;padding:0;"></ul>

    <!-- Host-only controls -->
    <div id="hostControls" style="display:none;">
      <p style="font-size:12px;color:#888;margin:8px 0 4px;">Game Mode</p>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="solo" id="modeSolo">Solo</button>
        <button class="mode-btn" data-mode="team" id="modeTeam">Team (2v2)</button>
      </div>

      <!-- Team builder (shown when team mode) -->
      <div id="teamSetup">
        <div id="teamSlots"></div>
        <button id="applyTeamsBtn" style="width:100%;margin-top:8px;">Apply Teams</button>
      </div>

      <button id="startBtn" style="width:100%;margin-top:12px;">▶ Start Game</button>
    </div>
  </div>

  <hr>

  <!-- LEADERBOARD -->
  <div id="leaderboardSection" style="display:none;">
    <h3>Leaderboard</h3>
    <div id="leaderboard"></div>
  </div>

  <!-- GAME AREA -->
  <div id="game"></div>

</div>

<!-- TEAM CHAT PANEL -->
<div id="chatPanel">
  <div id="chatHeader">
    💬 Team Chat
    <span class="badge" id="chatBadge">0</span>
  </div>
  <div id="chatBody">
    <div id="chatMessages"></div>
    <div id="chatInputRow">
      <input id="chatInput" placeholder="Message teammate…" maxlength="120"/>
      <button id="chatSend">Send</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
